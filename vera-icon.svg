<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: dark teal, iOS rounded-rect proportions -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#2B4F57"/>
  <!--
    White V with pencil-nib tip.
    Two subpaths with fill-rule="evenodd":
      1. Outer V pentagon (outer edges + nib tip triangle)
      2. Inner hollow (V cavity with a small concave arch at the bottom)
    Overlap = not filled = dark teal shows through as the nib arch.
  -->
  <path fill-rule="evenodd" fill="white" d="
    M 128 188 L 476 694 L 512 755 L 548 694 L 896 188 Z
    M 240 188 L 476 648 A 38 38 0 0 0 548 648 L 784 188 Z
  "/>
</svg>
